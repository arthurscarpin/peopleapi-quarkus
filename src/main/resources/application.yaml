quarkus:
  datasource:
    db-kind: mysql
    username: quarkus
    password: quarkus
    jdbc:
      url: jdbc:mysql://localhost:3306/quarkus_db

  hibernate-orm:
    database:
      generation: validate
    log:
      sql: true
    packages: github.arthurscarpin.domain

  flyway:
    migrate-at-start: true
    locations: db/migration